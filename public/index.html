<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Twelve</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<div id="login" class="screen fade">
  <div class="box">
    <h2>Twelve</h2>
    <p>Введите номер</p>
    <input id="phone">
    <button onclick="login()">Войти</button>
    <div id="error"></div>
  </div>
</div>

<div id="main" class="hidden fade">
  <h1>Twelve</h1>
  <button class="big" onclick="openScanner()">Сканировать</button>
</div>

<div id="admin" class="hidden fade">
  <h1>Админ панель</h1>

  <button onclick="openScanner(true)">Добавить через QR</button>

  <input id="id" placeholder="ID (6 цифр)">
  <input id="bat" placeholder="Заряд">
  <button onclick="create()">Добавить</button>

  <div id="list"></div>
</div>

<div id="scanner" class="hidden">
  <div id="reader"></div>
</div>

<script src="script.js"></script>
</body>
</html>
