<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Twelve</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<div id="login" class="screen">
  <div class="box">
    <h2>Номер телефона:</h2>
    <input id="phone">
    <button onclick="login()">Войти</button>
    <div id="error" class="error"></div>
  </div>
</div>

<div id="main" class="screen hidden">
  <h1>Twelve</h1>

  <div id="ride"></div>

  <button onclick="openScanner()">📷</button>
  <button onclick="openPay()">Оплата</button>
  <button onclick="endRide()">Завершить</button>
</div>

<div id="admin" class="screen hidden">
  <h1>Админка</h1>

  <input id="newId" placeholder="ID самоката">
  <input id="newBat" placeholder="Заряд">
  <button onclick="createScooter()">Добавить</button>

  <div id="list"></div>
</div>

<div id="scanner" class="hidden">
  <div id="reader"></div>
</div>

<script src="script.js"></script>
</body>
</html>
