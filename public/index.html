<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="UTF-8">
<title>Twelve</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="login" class="screen">
  <h2>Twelve</h2>
  <input id="phone" placeholder="Номер телефона">
  <button onclick="login()">Войти</button>
  <p id="error"></p>
</div>

<div id="main" class="hidden">

  <div class="top">
    <span id="bal">Баланс: 0</span>
  </div>

  <div id="ride" class="ride hidden"></div>

  <button onclick="scan()">Сканировать</button>
  <button onclick="pay()">Пополнить</button>
  <button id="endBtn" class="hidden" onclick="endRide()">Завершить</button>

</div>

<div id="admin" class="hidden">
  <h2>Админ</h2>

  <input id="aid" placeholder="ID 6 цифр">
  <input id="abat" placeholder="Заряд">
  <button onclick="create()">Добавить</button>

  <div id="list"></div>
</div>

<script src="script.js"></script>
</body>
</html>
